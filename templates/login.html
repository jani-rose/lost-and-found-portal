{% extends 'base.html' %}

{% block title %}Student Login - Campus Finds{% endblock %}

{% block content %}
<div class="form-card">
    <h1 class="form-title">Student Login</h1>
    
    {% if error_message %}
        <div class="alert-error">
            <i class="fa-solid fa-triangle-exclamation"></i> {{ error_message }}
        </div>
    {% endif %}

    <form method="POST">
        {% csrf_token %}
        
        <div class="form-group">
            <label for="id_username">Register Number</label>
            {{ form.username }}
        </div>
        
        <div class="form-group">
            <label for="id_password">Password</label>
            {{ form.password }}
        </div>

        <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 1rem;">
            <i class="fa-solid fa-right-to-bracket"></i> Login
        </button>
    </form>

    <div class="form-footer">
        Don't have an account? <a href="{% url 'register' %}" class="btn-link">Register Here</a>
    </div>
</div>
{% endblock %}
